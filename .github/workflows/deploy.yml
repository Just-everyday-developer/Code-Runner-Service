name: Build and Deploy Code Runner Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: zerde-production-code-runner-service-deploy
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build and push Code Runner Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/zerde-code-runner-service:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/zerde-code-runner-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy Code Runner Service to server
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy service on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          script: |
            set -e
            cd "${{ secrets.SERVER_DEPLOY_PATH }}"

            if [ ! -f docker-compose.prod.yml ]; then
              echo "docker-compose.prod.yml not found in ${{ secrets.SERVER_DEPLOY_PATH }}. Run infra deploy first."
              exit 1
            fi

            echo '${{ secrets.DOCKERHUB_TOKEN }}' | docker login -u '${{ secrets.DOCKERHUB_USERNAME }}' --password-stdin

            docker compose -f docker-compose.prod.yml pull code-runner-service
            docker compose -f docker-compose.prod.yml up -d --no-deps code-runner-service
            docker image prune -f